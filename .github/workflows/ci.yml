name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run CI checks
        run: bash scripts/ci.sh
